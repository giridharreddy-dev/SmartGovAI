<!DOCTYPE html>
<html>
<head>
    <title>SmartGov AI - స్మార్ట్గవ్ AI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            color-scheme: light;
            --bg: #eaf4ff;
            --surface: rgba(255,255,255,0.92);
            --surface-strong: #ffffff;
            --border: rgba(148, 163, 184, 0.22);
            --text: #0f172a;
            --muted: #475569;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Inter, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #f8fbff 0%, #e2efff 35%, #e8f2ff 100%);
            min-height: 100vh;
            color: var(--text);
        }
        .page {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }
        .hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            box-shadow: var(--shadow);
            padding: 32px 36px;
            margin-bottom: 28px;
            backdrop-filter: blur(12px);
        }
        .hero h1 {
            margin: 0 0 10px;
            font-size: clamp(2.5rem, 3vw, 3.4rem);
            letter-spacing: -0.04em;
            color: #1f2937;
        }
        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.8;
            max-width: 780px;
        }
        .input-card {
            display: grid;
            gap: 16px;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
            margin-bottom: 28px;
        }
        .input-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-group select {
            flex: 1;
            min-width: 240px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 16px;
            padding: 14px 16px;
            background: white;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.05);
            font-size: 1rem;
            color: var(--text);
        }
        .input-group button {
            min-width: 220px;
            padding: 14px 18px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .input-group button:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 36px rgba(37, 99, 235, 0.25);
        }
        .info-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(37, 99, 235, 0.08);
            color: #1e40af;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 0.95rem;
            width: fit-content;
        }
        .result-grid {
            display: grid;
            gap: 22px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
            border: 1px solid rgba(148, 163, 184, 0.14);
            padding: 22px;
        }
        .card h4 {
            margin: 0 0 12px;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .card p {
            margin: 0;
            color: #334155;
            line-height: 1.8;
        }
        .audio-container {
            background: #eff6ff;
            border-radius: 24px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            padding: 24px;
            text-align: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
        }
        .audio-container strong {
            display: block;
            margin-bottom: 14px;
            font-size: 1rem;
            color: #1e3a8a;
        }
        audio {
            width: 100%;
            max-width: 560px;
            border-radius: 14px;
            outline: none;
        }
        .footer {
            text-align: center;
            margin-top: 36px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .footer a {
            color: #2563eb;
            text-decoration: none;
        }
        .loader {
            padding: 26px 0;
            color: #334155;
            text-align: center;
            font-weight: 600;
        }
        @media (max-width: 760px) {
            .page { padding: 24px 0 36px; }
            .hero { padding: 26px 24px; }
            .input-card { padding: 20px; }
            .input-group { flex-direction: column; }
            .input-group button { width: 100%; }
            .card { padding: 18px; }
            .audio-container { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 SmartGov AI</h1>
    <div class="subtitle">ప్రభుత్వ ఆరోగ్య పథకాల సరళీకరణ | Simplifying Government Healthcare Schemes</div>

    <div class="input-group">
        <select id="schemeSelect">
            <option value="">-- ఒక పథకాన్ని ఎంచుకోండి --</option>
            {% for scheme in schemes %}
            <option value="{{ scheme }}">{{ scheme }}</option>
            {% endfor %}
        </select>
        <button type="button" onclick="simplifyScheme()">📖 వివరాలు చూడండి & 🎧 వినండి</button>
    </div>
    
    <div id="result"></div>
    <footer>
        💡 ఈ పథకాలు కేంద్ర & రాష్ట్ర ప్రభుత్వాల అధికారిక సమాచారం ఆధారంగా రూపొందించబడ్డాయి.<br>
        మరింత సమాచారం కోసం మీ స్థానిక ప్రభుత్వ ఆసుపత్రిని సంప్రదించండి.
    </footer>
</div>

<script>
async function simplifyScheme() {
    let select = document.getElementById('schemeSelect');
    let name = select.value;
    if (!name) {
        alert("దయచేసి ఒక పథకాన్ని ఎంచుకోండి / Please select a scheme.");
        return;
    }
    
    document.getElementById('result').innerHTML = '<div class="loader">⏳ దయచేసి వేచి ఉండండి... Loading...</div>';
    
    let res = await fetch('/simplify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({scheme_name: name})
    });
    let data = await res.json();

    if (!res.ok) {
        document.getElementById('result').innerHTML = `<div class="loader">⚠️ అర్ధం కాలేదా? ${data.error || 'Scheme not found.'}</div>`;
        return;
    }
    
    let html = `
        <h3>📘 English Summary</h3>
        <div class='card'><h4>✅ Eligibility</h4> ${data.simplified.eligibility}</div>
        <div class='card'><h4>💰 Benefits</h4> ${data.simplified.benefits}</div>
        <div class='card'><h4>📄 Documents</h4> ${data.simplified.documents}</div>
        <div class='card'><h4>📌 How to Apply</h4> ${data.simplified.steps}</div>
        
        <hr>
        
        <h3>📗 తెలుగు సారాంశం</h3>
        <div class='card'><h4>✅ అర్హత</h4> ${data.telugu.eligibility}</div>
        <div class='card'><h4>💰 ప్రయోజనాలు</h4> ${data.telugu.benefits}</div>
        <div class='card'><h4>📄 అవసరమైన పత్రాలు</h4> ${data.telugu.documents}</div>
        <div class='card'><h4>📌 దరఖాస్తు దశలు</h4> ${data.telugu.steps}</div>
        
        <div class='audio-container'>
            <strong>🎧 తెలుగులో వినండి / Listen in Telugu</strong>
            <audio controls>
                <source src='${data.voice_url}' type='audio/mpeg'>
                Your browser does not support audio.
            </audio>
        </div>
    `;
    
    document.getElementById('result').innerHTML = html;
}

// Optional: auto-trigger when user selects from dropdown
document.getElementById('schemeSelect').addEventListener('change', function() {
    if (this.value) {
        simplifyScheme();
    }
});
</script>
</body>
</html>
